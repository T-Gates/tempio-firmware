services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: tempio-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data

  server:
    build:
      context: ../server
    container_name: tempio-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TEMPIO_MQTT_BROKER_HOST=mosquitto
      - TEMPIO_DB_PATH=/data/tempio.db
    volumes:
      - server-data:/data
    depends_on:
      - mosquitto

volumes:
  mosquitto-data:
  server-data:
