; tempio — 모노레포
; pio run -e hub -t upload   → 허브 플래시
; pio run -e sensor -t upload → 센서노드 플래시
; pio run -e ir -t upload     → IR노드 플래시

[common]
framework = arduino
monitor_speed = 115200

; ──────────────── 허브 ────────────────
; Phase 1: C3로 테스트. Phase 3에서 S3로 변경.
[env:hub]
extends = common
platform = espressif32
; board = lolin_c3_mini
; board = esp32-s3-devkitc-1
board = esp32dev
build_src_filter = -<*> +<hub/>
build_flags =
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=5
lib_deps =
    sensirion/Sensirion I2C SCD4x
    h2zero/NimBLE-Arduino
    bblanchon/ArduinoJson

; ──────────────── 센서노드 ────────────
[env:sensor]
extends = common
platform = espressif32
board = lolin_c3_mini
build_src_filter = -<*> +<sensor/>
lib_deps =
    adafruit/DHT sensor library
    h2zero/NimBLE-Arduino
    ; sensirion/Sensirion I2C SHT4x  ; SHT40 도착 후 교체

; ──────────────── IR노드 ──────────────
[env:ir]
extends = common
platform = espressif32
board = lolin_c3_mini
build_src_filter = -<*> +<ir/>
lib_deps =
    crankyoldgit/IRremoteESP8266
    h2zero/NimBLE-Arduino
