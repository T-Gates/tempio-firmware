; tempio — 모노레포
; pio run -e hub -t upload   → 허브 플래시
; pio run -e sensor -t upload → 센서노드 플래시
; pio run -e ir -t upload     → IR노드 플래시

[common]
framework = arduino
monitor_speed = 115200

; ──────────────── 허브 ────────────────
[env:hub]
extends = common
platform = espressif32
board = esp32-s3-devkitc-1
build_src_filter = -<*> +<hub/>
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    sensirion/Sensirion I2C SCD4x

; ──────────────── 센서노드 ────────────
[env:sensor]
extends = common
platform = espressif32
board = esp32-c3-devkitm-1
build_src_filter = -<*> +<sensor/>
lib_deps =
    sensirion/Sensirion I2C SHT4x

; ──────────────── IR노드 ──────────────
[env:ir]
extends = common
platform = espressif32
board = esp32-c3-devkitm-1
build_src_filter = -<*> +<ir/>
lib_deps =
    crankyoldgit/IRremoteESP8266
